# golangci-lint v2 config. Keep the linter set small but sharp:
# enabling everything generates noise that drowns real signal.
#
# Rationale for each enabled linter:
#   errcheck   - unchecked errors are the #1 Go bug source
#   govet      - stdlib-blessed static analysis
#   ineffassign - dead assignments
#   staticcheck - comprehensive correctness suite
#   unused     - dead code
#   gofmt      - non-negotiable formatting
#   goimports  - import hygiene
#   misspell   - catch documentation typos
#   gosec      - security-focused (we SIGTERM processes, this matters)
#   revive     - configurable, replaces golint
#   gocritic   - opinionated but catches real bugs
#   unconvert  - redundant type conversions
#   unparam    - unused function parameters

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - revive
    - gocritic
    - unconvert
    - unparam

  settings:
    errcheck:
      exclude-functions:
        # CLI output to stdout/stderr. If the pipe is broken the
        # program is already dying; checking the error on every
        # Fprintf adds noise without recoverable value.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
    gosec:
      excludes:
        # G304: file inclusion via variable. We read files from paths
        # the user configured; this is by design, not a vuln.
        - G304

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - errcheck

# golangci-lint v2 runs formatters separately from linters. gofmt and
# goimports were listed in the header rationale but had to live under
# this block, not in linters.enable.
formatters:
  enable:
    - gofmt
    - goimports
