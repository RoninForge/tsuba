version: 2

project_name: tsuba

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: tsuba
    main: ./cmd/tsuba
    binary: tsuba
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/RoninForge/tsuba/internal/version.version={{.Version}}
      - -X github.com/RoninForge/tsuba/internal/version.commit={{.FullCommit}}
      - -X github.com/RoninForge/tsuba/internal/version.buildDate={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Docs
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: RoninForge
    name: tsuba
  draft: false
  prerelease: auto
  header: |
    ## tsuba {{ .Tag }}

    Scaffold marketplace-ready Claude Code skills and plugins in seconds.

    **Install:**

    ```sh
    curl -fsSL https://roninforge.org/tsuba/install.sh | sh
    ```

  footer: |
    ---

    **Full changelog**: https://github.com/RoninForge/tsuba/compare/{{ .PreviousTag }}...{{ .Tag }}
